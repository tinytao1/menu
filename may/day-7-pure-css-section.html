<!DOCTYPE html>
<html lang="en">
<head>
  <!-- "Dynamic Rendering" With Dynamic Rendering, you only update your groceryOrder object in the JavaScript, and the code automatically "draws" the HTML for you.-->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Order - State Management</title>
  <style>
    /* PAGE STYLES */
    body {
      font-family: sans-serif;
      background-color: #f3f4f6;
      padding: 2rem;
    }

    .page-wrapper {
      width: 100%;
      max-width: 22rem;
      margin-left: 0;
    }

    .main-title {
      font-size: 1.5rem;
      color: #4b5563;
      margin-bottom: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    /* DEBUG CONTROLS */
    .debug-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .debug-btn {
      padding: 0.5rem 1rem;
      background-color: #fef3c7; /* light yellow */
      border: 1px solid #f59e0b;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: monospace;
    }

    .reset-style {
      background-color: #fee2e2; /* light red */
      border-color: #ef4444;
    }

    /* CARD CONTAINER */
    .section-container {
      margin-bottom: 1.5rem;
      padding: 1rem;
      background-color: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 
                  0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .section-title {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #374151;
      text-transform: capitalize;
    }

    .header-instruction {
      text-transform: none;
      font-weight: 400;
    }

    /* GRID LAYOUT */
    .item-content {
      display: grid;
      grid-template-columns: 1fr 3rem;
      gap: 0.5rem;
    }

    /* BUTTONS & COUNTERS */
    .item-btn-primary, 
    .item-btn-options {
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 0.5rem 1rem;
      line-height: 1.25;
      cursor: pointer;
      transition: background-color 0.2s;
      color: #111827;
    }

    .item-btn-primary:hover, 
    .item-btn-options:hover {
      background-color: #e5e7eb;
    }

    .item-btn-primary { text-align: left; }
    .item-btn-options { text-align: center; }

    .item-count {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f9fafb;
      border-radius: 4px;
      font-weight: bold;
      color: #111827;
    }

    /* STATE CLASS */
    .is-selected {
      outline: 2px solid #3b82f6;
      outline-offset: -2px;
    }
  </style>
</head>
<body>

<div class="page-wrapper">
  <h1 class="main-title">Grocery Order</h1>

  <div class="debug-controls">
    <button id="check-order-btn" class="debug-btn">Check Order Data</button>
    <button id="global-reset-btn" class="debug-btn reset-style">Reset All Sections</button>
  </div>

  <!-- Section 1: Proteins -->
  <div class="section-container">
    <header class="section-header">
      <h2 class="section-title">Proteins <span class="header-instruction">(choose )</span></h2>
    </header>
    <section class="item-content">
      <button class="item-btn-primary" data-id="p1">Tilapia</button>
      <span class="item-count" id="count-p1">0</span>
      <button class="item-btn-primary" data-id="p2">Salmon</button>
      <span class="item-count" id="count-p2">0</span>
      <button class="item-btn-primary" data-id="p3">Pork Chop</button>
      <span class="item-count" id="count-p3">0</span>
      <button class="item-btn-options section-reset" data-section="Proteins">Reset</button>
    </section>
  </div>

  <!-- Section 2: Dairy -->
  <div class="section-container">
    <header class="section-header">
      <h2 class="section-title">Dairy <span class="header-instruction">(choose )</span></h2>
    </header>
    <section class="item-content">
      <button class="item-btn-primary" data-id="d1">Whole Milk</button>
      <span class="item-count" id="count-d1">0</span>
      <button class="item-btn-primary" data-id="d2">2% Milk</button>
      <span class="item-count" id="count-d2">0</span>
      <button class="item-btn-primary" data-id="d3">Nonfat Milk</button>
      <span class="item-count" id="count-d3">0</span>
      <button class="item-btn-options section-reset" data-section="Dairy">Reset</button>
    </section>
  </div>
</div>

<script>
  // 1. STATE MANAGEMENT OBJECT
  const groceryOrder = [
    {
      section: "Proteins",
      items: [
        { id: "p1", label: "Tilapia", count: 0 },
        { id: "p2", label: "Salmon", count: 0 },
        { id: "p3", label: "Pork Chop", count: 0 }
      ]
    },
    {
      section: "Dairy",
      items: [
        { id: "d1", label: "Whole Milk", count: 0 },
        { id: "d2", label: "2% Milk", count: 0 },
        { id: "d3", label: "Nonfat Milk", count: 0 }
      ]
    }
  ];

  // 2. CORE FUNCTIONS
  function updateUI() {
    groceryOrder.forEach(section => {
      section.items.forEach(item => {
        const span = document.getElementById(`count-${item.id}`);
        const btn = document.querySelector(`[data-id="${item.id}"]`);
        
        if (span) span.innerText = item.count;
        if (btn) {
          if (item.count > 0) {
            btn.classList.add('is-selected');
          } else {
            btn.classList.remove('is-selected');
          }
        }
      });
    });
  }

  // 3. EVENT LISTENERS
  // Item clicks
  document.querySelectorAll('.item-btn-primary').forEach(button => {
    button.addEventListener('click', () => {
      const itemId = button.getAttribute('data-id');
      groceryOrder.forEach(section => {
        const itemData = section.items.find(i => i.id === itemId);
        if (itemData) {
          itemData.count++;
          updateUI();
        }
      });
    });
  });

  // Section reset
  document.querySelectorAll('.section-reset').forEach(resetBtn => {
    resetBtn.addEventListener('click', () => {
      const sectionName = resetBtn.getAttribute('data-section');
      const section = groceryOrder.find(s => s.section === sectionName);
      if (section) {
        section.items.forEach(item => item.count = 0);
        updateUI();
      }
    });
  });

  // Global reset
  document.getElementById('global-reset-btn').addEventListener('click', () => {
    groceryOrder.forEach(section => {
      section.items.forEach(item => item.count = 0);
    });
    updateUI();
  });

  // Check order
  document.getElementById('check-order-btn').addEventListener('click', () => {
    console.log("Current Order Data:", JSON.stringify(groceryOrder, null, 2));
    alert("Data sent to Console (F12)");
  });
</script>

</body>
</html>
