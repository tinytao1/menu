<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Order - State Management Learning</title>
  <style>
    /* PAGE STYLES */
    body {
      font-family: sans-serif;
      background-color: #f3f4f6;
      padding: 2rem;
    }

    .page-wrapper {
      width: 100%;
      max-width: 22rem;
      margin-left: 0; 
    }

    .main-title {
      font-size: 1.5rem;
      color: #4b5563;
      margin-bottom: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    /* DEBUG BUTTON */
    .debug-btn {
      display: block;
      margin-bottom: 2rem;
      padding: 0.5rem 1rem;
      background-color: #fef3c7; /* light yellow */
      border: 1px solid #f59e0b;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: monospace;
    }

    /* CARD CONTAINER */
    .section-container {
      margin-bottom: 1.5rem;
      padding: 1rem;
      background-color: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 
                  0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    /* HEADER */
    .section-header {
      display: block;
    }

    .section-title {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #374151;
      text-transform: capitalize;
    }

    .header-instruction {
      text-transform: none;
      font-weight: 400;
    }

    /* GRID LAYOUT */
    .item-content {
      display: grid;
      grid-template-columns: 1fr 3rem;
      gap: 0.5rem;
    }

    /* BUTTONS & COUNTERS */
    .item-btn-primary, 
    .item-btn-options {
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 0.5rem 1rem;
      line-height: 1.25;
      cursor: pointer;
      transition: background-color 0.2s;
      color: #111827;
      font-size: 1rem;
    }

    .item-btn-primary:hover, 
    .item-btn-options:hover {
      background-color: #e5e7eb;
    }

    .item-btn-primary {
      text-align: left;
    }

    .item-btn-options {
      text-align: center;
    }

    .item-count {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f9fafb;
      border-radius: 4px;
      font-weight: bold;
      color: #111827;
    }

    /* STATE CLASS */
    .is-selected {
      outline: 2px solid #3b82f6;
      outline-offset: -2px;
    }
  </style>
</head>
<body>

<div class="page-wrapper">
  <h1 class="main-title">Grocery Order</h1>

  <button id="check-order-btn" class="debug-btn">Check Order Data</button>

  <!-- Section 1: Proteins -->
  <div class="section-container">
    <header class="section-header">
      <h2 class="section-title">
        Proteins <span class="header-instruction">(choose )</span>
      </h2>
    </header>
    
    <section class="item-content">
      <button class="item-btn-primary" data-id="p1">Tilapia</button>
      <span class="item-count" id="count-p1">0</span>

      <button class="item-btn-primary" data-id="p2">Salmon</button>
      <span class="item-count" id="count-p2">0</span>

      <button class="item-btn-primary" data-id="p3">Pork Chop</button>
      <span class="item-count" id="count-p3">0</span>

      <button class="item-btn-options">options</button>
    </section>
  </div>

  <!-- Section 2: Dairy -->
  <div class="section-container">
    <header class="section-header">
      <h2 class="section-title">
        Dairy <span class="header-instruction">(choose )</span>
      </h2>
    </header>
    
    <section class="item-content">
      <button class="item-btn-primary" data-id="d1">Whole Milk</button>
      <span class="item-count" id="count-d1">0</span>

      <button class="item-btn-primary" data-id="d2">2% Milk</button>
      <span class="item-count" id="count-d2">0</span>

      <button class="item-btn-primary" data-id="d3">Nonfat Milk</button>
      <span class="item-count" id="count-d3">0</span>

      <button class="item-btn-options">options</button>
    </section>
  </div>
</div>

<script>
  // 1. DATA OBJECT (The "State")
  const groceryOrder = [
    {
      section: "Proteins",
      items: [
        { id: "p1", label: "Tilapia", count: 0 },
        { id: "p2", label: "Salmon", count: 0 },
        { id: "p3", label: "Pork Chop", count: 0 }
      ]
    },
    {
      section: "Dairy",
      items: [
        { id: "d1", label: "Whole Milk", count: 0 },
        { id: "d2", label: "2% Milk", count: 0 },
        { id: "d3", label: "Nonfat Milk", count: 0 }
      ]
    }
  ];

  // 2. ITEM BUTTON CLICK LOGIC
  const buttons = document.querySelectorAll('.item-btn-primary');

  buttons.forEach(button => {
    button.addEventListener('click', () => {
      const itemId = button.getAttribute('data-id');

      // Update the Data Object
      groceryOrder.forEach(section => {
        const itemData = section.items.find(i => i.id === itemId);
        
        if (itemData) {
          // Increment count in state
          itemData.count++;
          
          // Update the UI (the Span)
          const counterSpan = document.getElementById(`count-${itemId}`);
          counterSpan.innerText = itemData.count;
        }
      });

      // Toggle visual outline
      button.classList.toggle('is-selected');
    });
  });

  // 3. DEBUG BUTTON LOGIC
  const checkBtn = document.getElementById('check-order-btn');
  checkBtn.addEventListener('click', () => {
    console.log("Current State Management Object:");
    console.log(JSON.stringify(groceryOrder, null, 2));
    alert("Data sent to Console (Press F12 to view)");
  });
</script>

</body>
</html>
