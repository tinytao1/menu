<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="container mt-3 " style="max-width:280px;">
  <h2 class="text-center">receipt container</h2>
  <p class="text-center">The .table class table:</p> 
  
  <table class="table border">
  
    <thead>    
      <tr>
        <th scope="col"></th>
        <th scope="col" ></th>
      </tr>
    </thead>
    
    <tbody>
    
      <tr>
        <td class="text-start">Name :</td>
        <td class="text-center
        		   align-middle
                   fs-6
                   fw-normal">
          Asadullah
        </td> <!-- fs=fontsize fw=fontweight -->
      </tr>
      
      <tr>
        <td>Mary</td>
        <td style="text-align:center;" >Moe</td>
      </tr>
      
      <tr>
        <td>July</td>
        <td class="d-flex justify-content-center">Dooley</td>
      </tr>
      
    </tbody>
    
  </table>
  
</div>

</body>
</html>
