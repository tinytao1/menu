<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    .limit {margin-bottom: 10px;
      }
    #limit-1 {
    border-right: 3px solid #a6aaad !important;
  }
  </style>
</head>
<body>

<div class="container mt-3">
  <div class="btn-group">
    <button type="button" id='limit-1' class="btn btn-light limit fs-5">1</button>
    <button type="button" id='limit-2' class="btn btn-light limit fs-5">2</button>
  </div>  
  
  <p>Limit is: <span id='show-limit'>0</span></p>
</div>

<script>
const buttons = document.querySelectorAll('.limit');
const display = document.getElementById('show-limit');
let limit = 0;

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    // 1. If we click the same button, reset to 0. Else, use button's number.
    const clickedValue = parseInt(btn.textContent);
    limit = (limit === clickedValue) ? 0 : clickedValue;
    
    // 2. Clear the "active" look from ALL buttons
    buttons.forEach(b => b.classList.remove('active'));
    
    // 3. If limit isn't 0, make the clicked button look selected
    if (limit !== 0) btn.classList.add('active');
    
    // 4. Update the text
    display.textContent = limit;
    
  });
});


</script>

</body>
</html>
