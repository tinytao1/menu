<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <style>

.select-container {
  display: grid;
  grid-template-columns: 220px 1fr; 
  gap: 10px;
  align-items: center;
  padding-left: 15px; /* Adds space between text and left edge */
}
.item {
  text-align: left;  
}
.icounter {
  border-radius: 3px;
  width: 25px;           /* Sets the specific width */
  justify-self: start;   /* Prevents the grid from stretching it */
  text-align: center;    /* Keeps the "0" centered inside that 15px */
}
.sreset-div {
  padding-left: 15px;
  padding-top: 10px;
}
.sreset-btn {
  text-align: left;  
  justify-self: start;   /* Prevents the grid from stretching it */
}

  </style>
</head>
<body>

<!-- <div class="section container mt-3 item-group grid"> -->

<div class="section-container" > 

  <h2>
    Proteins
  </h2>

  <div class="select-container" >

    <button type="button" class=" btn item btn-light ">
      Tilapia</button>
    <span class="icounter text-bg-light" > 0 &nbsp; </span>

    <button id='s1-2' type="button" class="btn  item btn-light" >
      Chicken Breast</button>
    <span id='s1-2c'  class="icounter text-bg-light" > 0 </span>

    <button type="button" class="btn  item btn-light">
      Pork Chop</button>
    <span class="icounter text-bg-light" > 0 </span>

    <button type="button" class="btn  item btn-light">
      Tempeh</button>
    <span class="icounter text-bg-light" > 0 </span>

    <button type="button" class="btn  item btn-light">
      Tuna (canned)</button>
    <span class="icounter text-bg-light" > 0 </span>

    <button type="button" class="btn item  btn-light">
      Protein Trail Mix</button>
    <span class="icounter text-bg-light" > 0 </span>

    <button type="button" class="btn  item btn-light">
      Firm Tofu</button>
    <span class="icounter text-bg-light" > 0 </span>

    <button type="button" class="btn  item btn-light">
      Tempeh Cauliflower Patty </button>
    <span class="icounter text-bg-light" > 0 </span>

  </div>  <!-- div class="select-container" -->

  <div class="sreset-div">
  
    <button type="button" class="btn sreset-btn  btn-light">
      reset</button>
    <span class="  " > </span>

  </div>  <!-- "sreset" -->
  
</div> <!-- div class="section-container -->
  
<!-- </div> -->

<script>
  document.getElementById("s1-2c").innerHTML = "&nbsp;";
</script>
















</body>
</html>
