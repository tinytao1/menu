<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <style>

.select-container {
  display: grid;
  grid-template-columns: 220px 1fr; 
  gap: 10px;
  align-items: center;
  padding-left: 15px; /* Adds space between text and left edge */
}
.item {
  text-align: left;  
}
.icounter {
  border-radius: 3px;
  width: 25px;           /* Sets the specific width */
  justify-self: start;   /* Prevents the grid from stretching it */
  text-align: center;    /* Keeps the "0" centered inside that 15px */
}
.sreset {
  text-align: left;  
  justify-self: start;   /* Prevents the grid from stretching it */
}

  </style>
</head>
<body>

<!-- <div class="section container mt-3 item-group grid"> -->

<div class="section-container" > 

  <h2>
    Proteins
  </h2>

  <div class="select-container" >

    <button type="button" class=" btn item btn-light ">Chicken</button>
    <span class="icounter text-bg-light" > 0 &nbsp; </span>

    <button type="button" class="btn  item btn-light" disabled>
      Tempeh</button>
    <span class="icounter text-bg-light" > 0 </span>

    <button type="button" class="btn  item btn-light">Pork Chop</button>
    <span class="icounter text-bg-light" > 0 </span>


    <button type="button" class="btn  item btn-light">Tilapia</button>
    <span class="icounter text-bg-light" > 0 </span>

    <button type="button" class="btn  item btn-light">Tempeh Cauli-<br>flower Patty</button>
    <span class="icounter text-bg-light" > 0 </span>

    <button type="button" class="btn item  btn-light">Protein Trail<br> Mix</button>
    <span class="icounter text-bg-light" > 0 </span>

    <button type="button" class="btn sreset  btn-light">reset</button>
    <span class="  " > </span>


  </div>  <!-- div class="select-container -->

  </div> <!-- div class="section-container -->
  
<!-- </div> -->
















</body>
</html>
