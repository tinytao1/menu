<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <style>
  
  .section {
    width: 270px;
  }
  
  .item-group {
    width: 270px;
    display: grid;
    grid-template-columns: 220px 1fr; 
    gap: 10px;
    align-items: center;
    padding-left: 15px; /* Adds space between text and left edge */
  }
  
  .counter {
    border-radius: 3px;
    width: 20px;           /* Sets the specific width */
    justify-self: start;   /* Prevents the grid from stretching it */
    text-align: center;    /* Keeps the "0" centered inside that 15px */
  }
    
  </style>
</head>
<body>
  
<div class=" container-fluid mt-4 section ms-1">  <!-- START SECTION 1 CONTAINER -->

  <h1> Bootstrap Page</h1>
  
  <p>This part is inside a .container class.</p>
  
  <div class="item-group">  <!-- START ITEM/COUNT ROW -->
  
  	<div class="  " >
    
      <button type="button" class=" btn item btn-light fs-5">
        Tilapia
      </button>
        
    </div>
    
    <div class=" ">
    
      <span class="counter text-bg-light fs-4" > 0 </span>
      
	</div>
    
  </div> <!-- END ROW -->
  
  <div class="item-group">  <!-- START ITEM/COUNT ROW -->
  
  	<div class=" " >
    
      <button type="button" class=" btn item btn-light fs-5">
        Chicken Breast
      </button>
        
    </div>
    
    <div class="  ">
    
      <span class="counter text-bg-light fs-4" > 0 </span>
      
	</div>
    
  </div> <!-- END ROW -->
  
  <div class="item-group">  <!-- START ITEM/COUNT ROW -->
  
  	<div class="  " >
    
      <button type="button" class=" btn item btn-light fs-5">
        Pork Chop
      </button>
        
    </div>
    
    <div class="  ">
    
      <span class="counter text-bg-light fs-4" > 0 </span>
      
	</div>
    
  </div> <!-- END ROW -->
  
</div>  <!-- END SECTION 1 CONTAINER -->





</body>
</html>
