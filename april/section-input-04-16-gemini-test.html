<!DOCTYPE html>
<html lang="en">
<head>
  <title>Menu Selection Tracker</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    /* Custom class for the persistent selected state */
    .selected {
      outline: 2px solid #0000ff !important;
      box-shadow: none !important;
      z-index: 1;
    }

    .btn-light:focus {
      box-shadow: none !important;
    }

    /* Styling for the counter element to match button background and height */
    .counter-badge {
      min-width: 40px;
      padding-left: 10px;
      padding-right: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1rem;
      background-color: #f8f9fa; 
      /* Initially match background color to make '0' invisible */
      color: #f8f9fa; 
      border: 1px solid #dee2e6;
      border-radius: var(--bs-border-radius);
      transition: all 0.1s ease;
    }

    /* Make text black if selected to indicate active status */
    .active-text {
      color: #000000 !important;
    }

    .section-header {
      border-bottom: 2px solid #dee2e6;
      padding-bottom: 10px;
      margin-bottom: 20px;
      color: #495057;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #section-choose-amount {
      font-size: 0.9rem;
      color: #6c757d;
      vertical-align: middle;
    }

    .limit-reached {
      color: #dc3545 !important;
      font-weight: bold;
    }

    /* Style for buttons that are disabled and not selected */
    .btn-disabled-strike {
      text-decoration: line-through;
      text-decoration-thickness: 2px; /* Increased by 1px from default/initial */
      opacity: 0.6;
      pointer-events: none; /* Disables clicking */
    }

    /* Styling for the discrete reset button at the bottom */
    .btn-discrete-reset {
        border-color: #dee2e6;
        color: #212529; /* Darker text to match item buttons */
        background-color: #f8f9fa;
        font-size: 0.9rem;
        transition: all 0.2s;
    }
    
    .btn-discrete-reset:hover {
        background-color: #e2e6ea;
        color: #000000;
        border-color: #adb5bd;
    }
  </style>
</head>
<body>

<!--
State of the App Summary
Grocery Menu section 1 input is roughly complete.
Next steps: 
- Receipt view.
  - language addition option.
- 2X Order view.
- Menu title
- Fruits & Veggies section settings.

The Grocery Menu Selection Tracker is currently a functional front-end prototype 
built with HTML5, CSS3, and Bootstrap 5. It features a responsive "Proteins" section 
where users can select up to two items. The app includes a smart "Limit Reached" 
state that strikes through unselected options while allowing users to deselect 
active items by clicking them again (resetting individual counts). It employs a 
custom UI with persistent blue outlines for selections, dynamic badge counters that
reveal themselves only when active, and a dedicated, discrete "Reset" button that
remains functional even when the selection limit is met. The logic is handled via 
a centralized JavaScript state object, making it ready for future expansion into
additional menu categories or persistent storage.
-->

<div class="container-fluid mt-4">
  <h2 class="mb-4">Grocery Menu</h2>

  <!-- Section 1: Proteins -->
  <section id="section-1" class="mb-5">
    <div class="d-flex align-items-center justify-content-between mb-3 border-bottom pb-2">
      <div class="d-flex align-items-center">
        <h5 class="mb-0 me-2 text-uppercase letter-spacing-1">Section 1: Proteins</h5> 
        <span id='section-choose-amount'>(choose <span id="section-limit"></span>)</span>
      </div>
      <!-- Secondary header reset -->
      <button class="btn btn-sm btn-outline-secondary" onclick="resetSection1()">Reset</button>
    </div>
    
    <!-- Item Grid (Buttons in here get disabled on limit reach) -->
    <div class="d-grid gap-3 col-md-4 col-lg-4 mb-3" id="protein-grid">
      
      <!-- Row 1 -->
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="tilapia" onclick="incrementCounter(this, 'tilapia')">Tilapia</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>

      <!-- Row 2 -->
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="chickenBreast" onclick="incrementCounter(this, 'chickenBreast')">Chicken Breast</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>

      <!-- Row 3 -->
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="porkChop" onclick="incrementCounter(this, 'porkChop')">Pork Chop</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>

      <!-- Row 4 -->
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="tempeh" onclick="incrementCounter(this, 'tempeh')">Tempeh</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>

      <!-- Row 5 -->
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="tuna" onclick="incrementCounter(this, 'tuna')">Tuna</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>

      <!-- Row 6 -->
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="proteinTrailMix" onclick="incrementCounter(this, 'proteinTrailMix')">Protein Trail Mix</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>

      <!-- Row 7 -->
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="firmTofu" onclick="incrementCounter(this, 'firmTofu')">Firm Tofu</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>

      <!-- Row 8 -->
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="tempehCauliflowerPatty" onclick="incrementCounter(this, 'tempehCauliflowerPatty')">Tempeh Cauliflower Patty</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>

    </div>

    <!-- Section Discrete Reset Button (Outside the grid to avoid being disabled) -->
    <div class="col-md-4">
      <button class="btn btn-discrete-reset px-3 py-2" onclick="resetSection1()">Reset</button>
    </div>
  </section>

  <!-- Placeholder for future sections -->
  <section id="section-2" class="text-muted">
    <p><small>Additional menu sections can be added here...</small></p>
  </section>

</div>

<script>
  // Global state to keep track of item counts across the whole app
  const itemTracker = {
    tilapia: 0,
    chickenBreast: 0,
    porkChop: 0,
    tempeh: 0,
    tuna: 0,
    proteinTrailMix: 0,
    firmTofu: 0,
    tempehCauliflowerPatty: 0
  };

  // Keep track of section item counts
  const section1 = {
    limit: 2,
    count: 0, 
    items: {
      tilapia: 0,
      chickenBreast: 0,
      porkChop: 0,
      tempeh: 0,
      tuna: 0,
      proteinTrailMix: 0,
      firmTofu: 0,
      tempehCauliflowerPatty: 0
    }
  };

  // Initialize UI with values from JS
  window.onload = function() {
    document.getElementById('section-limit').innerText = section1.limit;
  };

  function incrementCounter(button, itemKey) {
    const counterElement = button.parentElement.querySelector('.counter-badge');
    
    // Check if we are at the limit and this button is already selected
    if (section1.count === section1.limit && button.classList.contains('selected')) {
      // 1. Subtract this item's contribution from the total count
      section1.count -= itemTracker[itemKey];
      
      // 2. Reset the trackers for this item
      itemTracker[itemKey] = 0;
      section1.items[itemKey] = 0;
      
      // 3. Update UI to unselected state
      button.classList.remove('selected');
      counterElement.innerText = '0';
      counterElement.classList.remove('active-text');
      
      // 4. Clean up "Limit Reached" UI
      document.getElementById('section-choose-amount').classList.remove('limit-reached');
      const proteinGrid = document.getElementById('protein-grid');
      proteinGrid.querySelectorAll('button').forEach(btn => {
        btn.classList.remove('btn-disabled-strike');
      });
      
      console.log("Section 1 Count Reset for item:", itemKey, "Total Count:", section1.count);
      return;
    }

    // Standard increment logic (if limit not reached)
    if (section1.count < section1.limit) {
      itemTracker[itemKey]++;
      section1.items[itemKey]++;
      section1.count++;
      
      counterElement.innerText = itemTracker[itemKey];

      if (itemTracker[itemKey] > 0) {
        button.classList.add('selected');
        counterElement.classList.add('active-text');
      }

      // Handle Limit Reached logic
      if (section1.count === section1.limit) {
        document.getElementById('section-choose-amount').classList.add('limit-reached');
        
        const proteinGrid = document.getElementById('protein-grid');
        proteinGrid.querySelectorAll('button').forEach(btn => {
          if (!btn.classList.contains('selected')) {
            btn.classList.add('btn-disabled-strike');
          }
        });
      }
    }

    console.log("Section 1 Count:", section1.count);
  }

  function resetSection1() {
    section1.count = 0;
    for (let key in section1.items) {
      section1.items[key] = 0;
      itemTracker[key] = 0; 
    }

    document.getElementById('section-choose-amount').classList.remove('limit-reached');
    const proteinGrid = document.getElementById('protein-grid');
    
    proteinGrid.querySelectorAll('button').forEach(btn => {
      btn.classList.remove('selected');
      btn.classList.remove('btn-disabled-strike');
    });
    
    proteinGrid.querySelectorAll('.counter-badge').forEach(badge => {
      badge.innerText = '0';
      badge.classList.remove('active-text');
    });
  }
</script>

</body>
</html>
