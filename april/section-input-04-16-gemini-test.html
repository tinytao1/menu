<!DOCTYPE html>
<html lang="en">
<head>
  <title>Menu Selection Tracker</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #212529;
      --btn-bg: #f8f9fa;
      --btn-border: #dee2e6;
      --btn-hover: #f2f2f2;
      --badge-bg: #f8f9fa;
      --badge-text-inactive: #f8f9fa;
      --disabled-bg: #d1d1d1;
      --disabled-border: #b0b0b0;
      --header-border: #dee2e6;
      --muted-text: #6c757d;
    }

    [data-bs-theme="dark"] {
      --bg-color: #1a1d20;
      --text-color: #f8f9fa;
      --btn-bg: #2b3035;
      --btn-border: #495057;
      --btn-hover: #3d4246;
      --badge-bg: #2b3035;
      --badge-text-inactive: #2b3035;
      --disabled-bg: #41464a;
      --disabled-border: #343a40;
      --header-border: #495057;
      --muted-text: #adb5bd;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .selected {
      outline: 2px solid #0000ff !important;
      box-shadow: none !important;
      z-index: 1;
    }

    .btn-light {
      background-color: var(--btn-bg) !important;
      border-color: var(--btn-border) !important;
      color: var(--text-color) !important;
    }

    .btn-light:focus {
      box-shadow: none !important;
    }

    .btn-light:hover {
      background-color: var(--btn-hover) !important;
      border-color: var(--btn-border) !important;
    }

    .counter-badge {
      min-width: 40px;
      padding-left: 10px;
      padding-right: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1rem;
      background-color: var(--badge-bg); 
      color: var(--badge-text-inactive); 
      border: none; 
      border-radius: var(--bs-border-radius);
      transition: all 0.1s ease;
    }

    .active-text {
      color: var(--text-color) !important;
    }

    .border-bottom {
      border-color: var(--header-border) !important;
    }

    #section-choose-amount {
      font-size: 0.9rem;
      color: var(--muted-text);
      vertical-align: middle;
    }

    .limit-reached {
      color: #dc3545 !important;
      font-weight: bold;
    }

    .btn-disabled-strike {
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      opacity: 0.6;
      background-color: var(--disabled-bg) !important;
      border-color: var(--disabled-border) !important;
      pointer-events: none;
    }

    .btn-discrete-reset {
        border-color: var(--btn-border);
        color: var(--text-color);
        background-color: var(--btn-bg);
        font-size: 0.9rem;
        transition: all 0.2s;
    }
    
    .btn-discrete-reset:hover {
        background-color: var(--btn-hover);
        border-color: var(--muted-text);
    }

    .top-controls {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body data-bs-theme="light">

<!-- 
    LAYOUT NOTES & CONFIGURATION:
    - Office Desktop view optimized
    - 1/3 Width layout via col-4
    - Dark mode supported via data-bs-theme
    - 2X Toggle state persists across resets
    - Neutral grey lockout mechanism implemented
-->

<div class="top-controls">
  <button class="btn btn-outline-primary btn-sm" id="doubleOrderBtn" onclick="toggleOrderMultiplier()">
    2X Order
  </button>
  <button class="btn btn-outline-secondary btn-sm" id="themeSwitcher" onclick="toggleTheme()">
    Dark Mode
  </button>
</div>

<div class="container-fluid mt-4">
  <h2 class="mb-4">Grocery Menu</h2>

  <!-- Section 1: Proteins -->
  <section id="section-1" class="mb-5">
    <div class="d-flex align-items-center justify-content-between mb-3 border-bottom pb-2">
      <div class="d-flex align-items-center">
        <h5 class="mb-0 me-2 text-uppercase letter-spacing-1">Section 1: Proteins</h5> 
        <span id='section-choose-amount'>(choose <span id="section-limit"></span>)</span>
      </div>
      <button class="btn btn-sm btn-outline-secondary" onclick="resetSection1()">Reset</button>
    </div>
    
    <div class="d-grid gap-2 col-4 mb-3" id="protein-grid">
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="tilapia" onclick="incrementCounter(this, 'tilapia')">Tilapia</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="chickenBreast" onclick="incrementCounter(this, 'chickenBreast')">Chicken Breast</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="porkChop" onclick="incrementCounter(this, 'porkChop')">Pork Chop</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="tempeh" onclick="incrementCounter(this, 'tempeh')">Tempeh</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="tuna" onclick="incrementCounter(this, 'tuna')">Tuna</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="proteinTrailMix" onclick="incrementCounter(this, 'proteinTrailMix')">Protein Trail Mix</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="firmTofu" onclick="incrementCounter(this, 'firmTofu')">Firm Tofu</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light flex-grow-1 text-start" data-key="tempehCauliflowerPatty" onclick="incrementCounter(this, 'tempehCauliflowerPatty')">Tempeh Cauliflower Patty</button>
        <span class="badge counter-badge align-self-stretch">0</span>
      </div>
    </div>

    <div class="col-4">
      <button class="btn btn-discrete-reset px-3 py-2" onclick="resetSection1()">Reset</button>
    </div>
  </section>

  <section id="section-2" class="text-muted">
    <p><small>Additional menu sections can be added here...</small></p>
  </section>

</div>

<script>
  // Global multiplier state
  let isDoubleOrder = false;
  const BASE_LIMIT_SECTION_1 = 2;

  const itemTracker = {
    tilapia: 0, chickenBreast: 0, porkChop: 0, tempeh: 0, 
    tuna: 0, proteinTrailMix: 0, firmTofu: 0, tempehCauliflowerPatty: 0
  };

  const section1 = {
    limit: BASE_LIMIT_SECTION_1,
    count: 0, 
    items: {
      tilapia: 0, chickenBreast: 0, porkChop: 0, tempeh: 0, 
      tuna: 0, proteinTrailMix: 0, firmTofu: 0, tempehCauliflowerPatty: 0
    }
  };

  window.onload = function() {
    updateLimitDisplays();
  };

  function updateLimitDisplays() {
    section1.limit = isDoubleOrder ? BASE_LIMIT_SECTION_1 * 2 : BASE_LIMIT_SECTION_1;
    document.getElementById('section-limit').innerText = section1.limit;
  }

  function toggleOrderMultiplier() {
    isDoubleOrder = !isDoubleOrder;
    const btn = document.getElementById('doubleOrderBtn');
    btn.innerText = isDoubleOrder ? '1X Order' : '2X Order';
    
    // Switch styling to indicate active multiplier
    if (isDoubleOrder) {
      btn.classList.replace('btn-outline-primary', 'btn-primary');
    } else {
      btn.classList.replace('btn-primary', 'btn-outline-primary');
    }

    // Changing the multiplier resets selections to avoid logical inconsistencies
    resetSection1();
    updateLimitDisplays();
  }

  function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeSwitcher');
    if (body.getAttribute('data-bs-theme') === 'light') {
      body.setAttribute('data-bs-theme', 'dark');
      btn.innerText = 'Light Mode';
    } else {
      body.setAttribute('data-bs-theme', 'light');
      btn.innerText = 'Dark Mode';
    }
  }

  function incrementCounter(button, itemKey) {
    const counterElement = button.parentElement.querySelector('.counter-badge');
    
    // Toggle off logic
    if (section1.count === section1.limit && button.classList.contains('selected')) {
      section1.count -= itemTracker[itemKey];
      itemTracker[itemKey] = 0;
      section1.items[itemKey] = 0;
      
      button.classList.remove('selected');
      counterElement.innerText = '0';
      counterElement.classList.remove('active-text');
      
      document.getElementById('section-choose-amount').classList.remove('limit-reached');
      const proteinGrid = document.getElementById('protein-grid');
      proteinGrid.querySelectorAll('button').forEach(btn => {
        btn.classList.remove('btn-disabled-strike');
      });
      return;
    }

    // Standard increment logic
    if (section1.count < section1.limit) {
      itemTracker[itemKey]++;
      section1.items[itemKey]++;
      section1.count++;
      
      counterElement.innerText = itemTracker[itemKey];

      if (itemTracker[itemKey] > 0) {
        button.classList.add('selected');
        counterElement.classList.add('active-text');
      }

      if (section1.count === section1.limit) {
        document.getElementById('section-choose-amount').classList.add('limit-reached');
        const proteinGrid = document.getElementById('protein-grid');
        proteinGrid.querySelectorAll('button').forEach(btn => {
          if (!btn.classList.contains('selected')) {
            btn.classList.add('btn-disabled-strike');
          }
        });
      }
    }
  }

  function resetSection1() {
    section1.count = 0;
    for (let key in section1.items) {
      section1.items[key] = 0;
      itemTracker[key] = 0; 
    }

    document.getElementById('section-choose-amount').classList.remove('limit-reached');
    const proteinGrid = document.getElementById('protein-grid');
    
    proteinGrid.querySelectorAll('button').forEach(btn => {
      btn.classList.remove('selected');
      btn.classList.remove('btn-disabled-strike');
    });
    
    proteinGrid.querySelectorAll('.counter-badge').forEach(badge => {
      badge.innerText = '0';
      badge.classList.remove('active-text');
    });
  }
</script>

</body>
</html>
