<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <style>
   /* The new wrapper that holds both the grid and the receipt */
  .main-wrapper {
    display: flex;
    align-items: flex-start; /* Keeps receipt at the top */
    gap: 20px; /* Space between the grid and the receipt */
  }

  .parent {
    background-color: palegreen; 
    width: 350px; /* Fixed width for the grid area */
    display: grid;
    /* Removed the 1fr column since the receipt is now outside */
    grid-template-columns: 200px 15px 20px 43px; 
    row-gap: 6px;
    align-items: center; 
  }

  .spacer-col-1, .spacer-col-2 {
    background-color: lightblue;
    align-self: stretch;
  }

  .receipt-div {
    background-color: lightpink;
    width: 200px;
    padding: 15px;
    border: 1px solid #ddd;
    /* No grid properties needed anymore! */
  }
  </style>
</head>
<body>

<div class='container-fluid mt-3 main-wrapper items-group'> <!-- START ITEMS CONTAINER -->

<div class='parent item-buttons-grid'> 

  <!-- START Row 1 -->
  <div class=' item-col '> <!-- product button -->
    <button type='button' class='btn btn-primary w-100 text-start'>child 1</button></div>
  <div class='spacer-col-1'>&nbsp;</div> <!-- spacer-col -->
  <div class='counter-el-col'>0</div> <!-- counter -->
  <div class='spacer-col-2'>&nbsp;</div> <!-- spacer-col -->
  <!-- END Row 1 -->

  <!-- START Row 2 -->
  <div class=' item-col '> <!-- product button -->
    <button type='button' class='btn btn-primary w-100 text-start'>child 1</button></div>
  <div class='spacer-col-1'>&nbsp;</div> <!-- spacer-col -->
  <div class='counter-el-col'>0</div> <!-- counter -->
  <div class='spacer-col-2'>&nbsp;</div> <!-- spacer-col -->
  <!-- END Row 2 -->

  <!-- START Row 3 -->
  <div class=' item-col '> <!-- product button -->
    <button type='button' class='btn btn-primary w-100 text-start'>child 1</button></div>
  <div class='spacer-col-1'>&nbsp;</div> <!-- spacer-col -->
  <div class='counter-el-col'>0</div> <!-- counter -->
  <div class='spacer-col-2'>&nbsp;</div> <!-- spacer-col -->
  <!-- END Row 3 -->

</div>  <!-- END GRID PARENT -->

  <div class='receipt-div'>
    <p>Receipt contents here</p>
  </div>

</div> <!-- END ITEMS CONTAINER -->


</body>
</html>
