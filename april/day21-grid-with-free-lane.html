<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    .parent {background-color: palegreen; 
    		 max-width:500px;
    		 margin-top: 10px;
             display: grid;
             grid-template-columns: 200px 5px 20px 43px 1fr;
             /*row-gap:14px; */
             } /* parent = 500px,  */ 
    .spacer-col-1, .spacer-col-2 {background-color: lightblue;}
  </style>
</head>
<body>

<div class='container-fluid'>

<div class='parent item-buttons-grid'> 

  <div class=' item-col '> <!-- product button -->
    <button type='button' class='btn btn-primary w-100 text-start'>
      child 1
    </button>
  </div>
  
  <div class='spacer-col-1'></div> <!-- spacer-col -->
  
  <div class='counter-el-col'>0</div> <!-- counter -->
  
  <div class='spacer-col-2'></div> <!-- spacer-col -->
  
  <div class='free-lane'>free lane</div>
  
</div>

</div>


</body>
</html>
