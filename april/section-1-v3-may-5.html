<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  
<style>
  .section {
    width: 270px;
  }
  
  .item-row {
    width: 270px;
    display: grid;
    /* Column 1 is 200px (button), Column 2 takes the rest (counter) */
    grid-template-columns: 200px 1fr; 
    gap: 10px;
    align-items: center;
    xpadding-left: 15px;
    margin-bottom: 10px; 
  }
  
  .counter {
    border-radius: 3px;
    width: 35px; /* Fixed width for the counter box */
    text-align: center;
    display: inline-block;
  }
</style>

</head>


<body>


<div class="container-fluid mt-4 section ms-1">
  <h1>Section 1 example</h1>
  
  <div class="item-row">
    <!-- Added w-100 to make the button fill the 200px column -->
    <button type="button" class="btn item btn-light fs-5 w-100 text-start">Tilapia</button>
    <span class="counter text-bg-light fs-4">0</span>
  </div>

  <div class="item-row">
    <button type="button" class="btn item btn-light fs-5 w-100 text-start">Chicken Breast</button>
    <span class="counter text-bg-light fs-4">30</span>
  </div>

  <div class="item-row">
    <button type="button" class="btn item btn-light fs-5 w-100 text-start">Pork Chop</button>
    <span class="counter text-bg-light fs-4">0</span>
  </div>
</div>


</body>
</html>
