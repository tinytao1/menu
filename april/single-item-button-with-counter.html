    <style>
      body {

      .section-container {
        margin-top: 20px;

      .section-header {
        padding-left: 15px;
        margin-bottom: 20px;
      }
      .select-container {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 10px;
        align-items: center;
        padding-left: 15px; /* Adds space between text and left edge */
      }
      .item {
        text-align: left;
        padding-left: 15px;
        /* Option 1: Reduce vertical padding */
        padding-top: 4px;
        padding-bottom: 4px;
        /* Option 1 fix: Ensure the border is always there but transparent */
        border: 4px solid transparent !important;
        /* Optional: Keep buttons consistent height */
        height: 44px;
        display: flex;
        align-items: center;
      }

      .item.selected-active {
        border-color: rgba(13, 110, 253, 0.75) !important;
        background-color: #f8f9fa !important;
      }

      /* Remove darkening effect on hover */
      .item:hover {
        background-color: #f8f9fa !important;
        border-color: rgba(13, 110, 253, 0.5) !important;
        color: #000 !important;
      }

      /* If the button is selected, keep the blue border even on hover */
      .item.selected-active:hover {
        border-color: rgba(13, 110, 253, 0.75) !important;
      }

      .icounter {
        border-radius: 3px;
        width: 20px; /* Sets the specific width */
        justify-self: start; /* Prevents the grid from stretching it */
        text-align: center; /* Keeps the "0" centered inside that 15px */
      }
      .sreset-div {
        padding-left: 15px;
        padding-top: 10px;
      }
      .sreset-btn {
        text-align: left;
        justify-self: start; /* Prevents the grid from stretching it */
      }
    </style>

    <script>
      const section = {
        limit: 2,
        count: 0,
        items: {
          // ADD "selected: false" to every item here
          "s1-1": { id: "s1-1", counterId: "s1-1c", count: 0, selected: false },
          "s1-2": { id: "s1-2", counterId: "s1-2c", count: 0, selected: false },
          "s1-3": { id: "s1-3", counterId: "s1-3c", count: 0, selected: false },
        },
        select: function (itemId) {
          const item = this.items[itemId];
          if (!item) return;

          if (this.count >= this.limit) {
            this.count -= item.count;
            item.count = 0;
            item.selected = false;
          } else {
            item.count += 1;
            this.count += 1;
            item.selected = true;
          }

          this.updateUI();
        },
        updateUI: function () {
          const isAtLimit = this.count >= this.limit;

          Object.values(this.items).forEach((item) => {
            const counterEl = document.getElementById(item.counterId);
            const buttonEl = document.getElementById(item.id);

            counterEl.innerText = item.count === 0 ? "\u00A0" : item.count;

            // Now item.selected is guaranteed to be true or false
            buttonEl.classList.toggle("selected-active", item.selected);

            const shouldDisable = isAtLimit && !item.selected;
            buttonEl.disabled = shouldDisable;
            buttonEl.style.textDecoration = shouldDisable
              ? "line-through"
              : "none";
          });
        },
      };

      const container = document.querySelector(".select-container");
      container.addEventListener("click", (e) => {
        const btn = e.target.closest("button");
        if (btn && section.items[btn.id]) {
          section.select(btn.id);
        }
      });

      // Use the updateUI function to handle initial state for all items
      section.updateUI();
    </script>
